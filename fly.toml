# Fly.io configuration for grebeshok-chat. Update the `app` name to match
# the app you create with `fly apps create`.

app = "grebeshok-chat"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  STATIC_DIR = "/app/backend/static"
  DATA_DIR = "/data"
  PYTHONUNBUFFERED = "1"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/health"

[[mounts]]
  source = "grebeshok_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
